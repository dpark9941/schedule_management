<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraingerHub Scraper</title>
    <style>
        body {
            width: 250px;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            text-align: center;
        }
        h2 {
            margin-top: 0;
            color: #13294B; /* UIUC Blue */
        }
        button {
            background-color: #E84A27; /* UIUC Orange */
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #CF3C1B;
        }
        #status {
            margin-top: 15px;
            font-size: 13px;
            color: #555;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <h2>GraingerHub</h2>
    <p style="font-size: 12px; color: #666; margin-bottom: 15px;">Canvas Dashboard 스케줄 추출</p>
    <button id="scrapeBtn">데이터 가져오기</button>
    <div id="status"></div>
    <script src="popup.js"></script>
</body>
</html>
